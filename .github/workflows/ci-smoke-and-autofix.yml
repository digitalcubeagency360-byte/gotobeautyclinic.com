name: CI Smoke Build and AutoFix CustomEvent

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  smoke-and-autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run build (smoke)
        id: build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log || true
          if grep -q "ReferenceError: CustomEvent is not defined" build.log; then
            echo "custom_event_missing=true" >> $GITHUB_OUTPUT
          else
            echo "custom_event_missing=false" >> $GITHUB_OUTPUT
            if grep -q "npm ERR!" build.log; then
              echo "build_failed=true" >> $GITHUB_OUTPUT
            else
              echo "build_failed=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Show build log (for debugging)
        if: always()
        run: sed -n '1,200p' build.log || true

      - name: Auto-fix CustomEvent polyfill
        if: steps.build.outputs.custom_event_missing == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "CustomEvent missing — applying auto-fix"

          # ensure polyfills dir and file
          mkdir -p src/polyfills
          cat > src/polyfills/custom-event.js <<'POLY'
if (typeof globalThis.CustomEvent === 'undefined') {
  class CustomEventPolyfill {
    constructor(type, params = {}) {
      this.type = type;
      this.detail = params.detail === undefined ? null : params.detail;
      this.bubbles = !!params.bubbles;
      this.cancelable = !!params.cancelable;
    }
  }
  globalThis.CustomEvent = CustomEventPolyfill;
}
POL

          # find entry file and add import if missing
          ENTRY=$(git ls-files 'src/**/main.*' 'src/**/index.*' 'src/**/app.*' | head -n 1 || true)
          if [ -n "$ENTRY" ]; then
            if ! grep -q "polyfills/custom-event" "$ENTRY"; then
              echo "import './polyfills/custom-event.js';" | cat - "$ENTRY" > /tmp/entry && mv /tmp/entry "$ENTRY"
              git add "$ENTRY"
            fi
          fi

          git add src/polyfills/custom-event.js

          # commit and push back to the branch that triggered the workflow
          BRANCH=${{ github.head_ref }}
          if [ -z "$BRANCH" ]; then
            BRANCH=$(git rev-parse --abbrev-ref HEAD)
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "ci(auto): add CustomEvent polyfill and import for CI build" || echo "No changes to commit"
          git push origin HEAD:"$BRANCH"

      - name: Fail if build failed (non CustomEvent)
        if: steps.build.outputs.build_failed == 'true'
        run: |
          echo "Build failed for reasons other than missing CustomEvent. See logs."
          exit 1
